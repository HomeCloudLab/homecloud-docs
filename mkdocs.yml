site_name: HomeCloud Docs
site_url: https://docs.web.holab.abrdns.com
site_description: HomeCloud platform, CLI, and SDK documentation

repo_name: HomeCloudLab/homecloud-docs
repo_url: https://github.com/HomeCloudLab/homecloud-docs
edit_uri: edit/main/docs/en/

theme:
  name: material
  language: en
  custom_dir: overrides
  palette:
    - scheme: homelab
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: homelab-light
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  font:
    text: Geist
    code: Geist Mono
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - en
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: he
          name: עברית
          build: true
          nav_translations:
            Home: בית
            Getting started: התחלה
            CLI: CLI
            SDK: SDK
            Platform: פלטפורמה
            Operations: תפעול
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started:
      - getting-started/overview.md
      - getting-started/accounts.md
      - getting-started/access-keys.md
  - CLI:
      - cli/index.md
      - cli/install.md
      - cli/authentication.md
      - cli/commands/index.md
      - cli/commands/configure.md
      - cli/commands/mq.md
      - cli/commands/so.md
      - cli/commands/login.md
      - cli/releases.md
  - SDK:
      - sdk/index.md
  - Platform:
      - platform/architecture.md
      - platform/services.md
  - Operations:
      - operations/docs-site.md

extra_css:
  - stylesheets/homecloud.css

extra_javascript:
  - javascripts/homecloud.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/HomeCloudLab
  alternate:
    - name: English
      link: /
      lang: en
    - name: עברית
      link: /he/
      lang: he
