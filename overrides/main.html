{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <script>
    (function () {
      var p = window.location.pathname.replace(/\/+$/, "") || "/";
      var he = p === "/he" || p.indexOf("/he/") === 0;
      var el = document.documentElement;
      el.setAttribute("data-md-color-scheme", "console");
      el.setAttribute("lang", he ? "he" : "en");
      el.setAttribute("dir", he ? "rtl" : "ltr");
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.2.5/latin-400.css"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.2.5/latin-600.css"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@5.2.5/latin-400.css"
  />
{% endblock %}
