{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <script>
    (function () {
      var segments = window.location.pathname.split("/").filter(Boolean);
      var he = segments.indexOf("he") !== -1;
      var dir = he ? "rtl" : "ltr";
      var el = document.documentElement;
      el.setAttribute("data-md-color-scheme", "console");
      el.setAttribute("lang", he ? "he" : "en");
      el.setAttribute("dir", dir);
      // Material renders <body dir="ltr"> (theme language is en); that attribute
      // overrides the layout direction. The body isn't parsed yet here, so set it
      // as soon as it appears to flip RTL without a flash of LTR.
      new MutationObserver(function (mutations, observer) {
        if (document.body) {
          document.body.setAttribute("dir", dir);
          observer.disconnect();
        }
      }).observe(el, { childList: true });
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.2.5/latin-400.css"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.2.5/latin-600.css"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@5.2.5/latin-400.css"
  />
{% endblock %}
